<!DOCTYPE html>
<html>
<head>
    <title>Simple Form</title>
</head>
<body>

<h1>Enter Your Details</h1>

<form action="/submit" method="POST">

    <label>Name</label><br>
    <input type="text" name="name" required><br><br>

    <label>Gender</label><br>
    <select name="gender">
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
    </select><br><br>

    <button type="submit">Submit</button>

</form>

</body>
</html>
